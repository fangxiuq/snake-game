<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>贪吃蛇游戏</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            font-family: 'Press Start 2P', cursive;
            overflow: hidden;
        }
        
        .game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }
        
        h1 {
            color: #e94560;
            font-size: 32px;
            text-shadow: 3px 3px 0 #0f3460, 5px 5px 10px rgba(0,0,0,0.5);
            letter-spacing: 4px;
        }
        
        .score-board {
            display: flex;
            gap: 40px;
            color: #fff;
            font-size: 14px;
        }
        
        .score-board span {
            color: #e94560;
        }
        
        #gameCanvas {
            border: 4px solid #e94560;
            border-radius: 8px;
            box-shadow: 0 0 30px rgba(233, 69, 96, 0.4), inset 0 0 20px rgba(0,0,0,0.3);
            background: #0a0a15;
        }
        
        .controls {
            display: flex;
            gap: 20px;
            margin-top: 10px;
        }
        
        .btn {
            padding: 12px 24px;
            font-family: 'Press Start 2P', cursive;
            font-size: 12px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
        }
        
        .btn-start {
            background: #e94560;
            color: #fff;
            box-shadow: 0 4px 0 #b8354d;
        }
        
        .btn-start:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 0 #b8354d;
        }
        
        .btn-start:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #b8354d;
        }
        
        .btn-reset {
            background: #533483;
            color: #fff;
            box-shadow: 0 4px 0 #3d2663;
        }
        
        .btn-reset:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 0 #3d2663;
        }
        
        .instructions {
            color: #888;
            font-size: 10px;
            text-align: center;
            line-height: 1.8;
            margin-top: 10px;
        }
        
        .game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(26, 26, 46, 0.95);
            padding: 40px 60px;
            border-radius: 12px;
            border: 3px solid #e94560;
            text-align: center;
            display: none;
            z-index: 100;
        }
        
        .game-over h2 {
            color: #e94560;
            font-size: 24px;
            margin-bottom: 20px;
        }
        
        .game-over p {
            color: #fff;
            font-size: 14px;
            margin-bottom: 30px;
        }
        
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            display: none;
            z-index: 50;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>🐍 贪吃蛇</h1>
        <div class="score-board">
            <div>得分: <span id="score">0</span></div>
            <div>最高分: <span id="highScore">0</span></div>
        </div>
        <canvas id="gameCanvas" width="400" height="400"></canvas>
        <div class="controls">
            <button class="btn btn-start" id="startBtn">开始游戏</button>
            <button class="btn btn-reset" id="resetBtn">重新开始</button>
        </div>
        <div class="instructions">
            使用方向键 ↑ ↓ ← → 控制蛇的移动<br>
            吃到食物可以得分，撞到墙壁或自己游戏结束
        </div>
    </div>
    
    <div class="overlay" id="overlay"></div>
    <div class="game-over" id="gameOver">
        <h2>游戏结束!</h2>
        <p>最终得分: <span id="finalScore">0</span></p>
        <button class="btn btn-start" id="restartBtn">再来一局</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const highScoreEl = document.getElementById('highScore');
        const finalScoreEl = document.getElementById('finalScore');
        const gameOverEl = document.getElementById('gameOver');
        const overlayEl = document.getElementById('overlay');
        const startBtn = document.getElementById('startBtn');
        const resetBtn = document.getElementById('resetBtn');
        const restartBtn = document.getElementById('restartBtn');
        
        const GRID_SIZE = 20;
        const TILE_COUNT = canvas.width / GRID_SIZE;
        
        let snake = [];
        let food = { x: 0, y: 0 };
        let direction = { x: 0, y: 0 };
        let nextDirection = { x: 0, y: 0 };
        let score = 0;
        let highScore = localStorage.getItem('snakeHighScore') || 0;
        let gameLoop = null;
        let isRunning = false;
        let isPaused = false;
        
        highScoreEl.textContent = highScore;
        
        function initGame() {
            snake = [
                { x: 10, y: 10 },
                { x: 10, y: 11 },
                { x: 10, y: 12 }
            ];
            direction = { x: 0, y: -1 };
            nextDirection = { x: 0, y: -1 };
            score = 0;
            scoreEl.textContent = score;
            spawnFood();
        }
        
        function spawnFood() {
            let validPosition = false;
            while (!validPosition) {
                food.x = Math.floor(Math.random() * TILE_COUNT);
                food.y = Math.floor(Math.random() * TILE_COUNT);
                validPosition = !snake.some(segment => segment.x === food.x && segment.y === food.y);
            }
        }
        
        function draw() {
            ctx.fillStyle = '#0a0a15';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Draw grid
            ctx.strokeStyle = 'rgba(233, 69, 96, 0.1)';
            ctx.lineWidth = 0.5;
            for (let i = 0; i <= TILE_COUNT; i++) {
                ctx.beginPath();
                ctx.moveTo(i * GRID_SIZE, 0);
                ctx.lineTo(i * GRID_SIZE, canvas.height);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(0, i * GRID_SIZE);
                ctx.lineTo(canvas.width, i * GRID_SIZE);
                ctx.stroke();
            }
            
            // Draw food
            const gradient = ctx.createRadialGradient(
                food.x * GRID_SIZE + GRID_SIZE / 2,
                food.y * GRID_SIZE + GRID_SIZE / 2,
                0,
                food.x * GRID_SIZE + GRID_SIZE / 2,
                food.y * GRID_SIZE + GRID_SIZE / 2,
                GRID_SIZE / 2
            );
            gradient.addColorStop(0, '#ff6b6b');
            gradient.addColorStop(1, '#e94560');
            
            ctx.fillStyle = gradient;
            ctx.beginPath();
            ctx.arc(
                food.x * GRID_SIZE + GRID_SIZE / 2,
                food.y * GRID_SIZE + GRID_SIZE / 2,
                GRID_SIZE / 2 - 2,
                0,
                Math.PI * 2
            );
            ctx.fill();
            
            // Glow effect for food
            ctx.shadowColor = '#e94560';
            ctx.shadowBlur = 15;
            ctx.fill();
            ctx.shadowBlur = 0;
            
            // Draw snake
            snake.forEach((segment, index) => {
                const isHead = index === 0;
                const alpha = 1 - (index / snake.length) * 0.5;
                
                if (isHead) {
                    ctx.fillStyle = '#00ff88';
                    ctx.shadowColor = '#00ff88';
                    ctx.shadowBlur = 10;
                } else {
                    ctx.fillStyle = `rgba(0, 255, 136, ${alpha})`;
                    ctx.shadowBlur = 0;
                }
                
                const radius = isHead ? 6 : 4;
                ctx.beginPath();
                ctx.roundRect(
                    segment.x * GRID_SIZE + 1,
                    segment.y * GRID_SIZE + 1,
                    GRID_SIZE - 2,
                    GRID_SIZE - 2,
                    radius
                );
                ctx.fill();
            });
            ctx.shadowBlur = 0;
        }
        
        function update() {
            direction = { ...nextDirection };
            
            const head = { x: snake[0].x + direction.x, y: snake[0].y + direction.y };
            
            // Check wall collision
            if (head.x < 0 || head.x >= TILE_COUNT || head.y < 0 || head.y >= TILE_COUNT) {
                gameOver();
                return;
            }
            
            // Check self collision
            if (snake.some(segment => segment.x === head.x && segment.y === head.y)) {
                gameOver();
                return;
            }
            
            snake.unshift(head);
            
            // Check food collision
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                scoreEl.textContent = score;
                
                if (score > highScore) {
                    highScore = score;
                    highScoreEl.textContent = highScore;
                    localStorage.setItem('snakeHighScore', highScore);
                }
                
                spawnFood();
            } else {
                snake.pop();
            }
        }
        
        function gameOver() {
            isRunning = false;
            clearInterval(gameLoop);
            finalScoreEl.textContent = score;
            overlayEl.style.display = 'block';
            gameOverEl.style.display = 'block';
        }
        
        function startGame() {
            if (isRunning) return;
            
            initGame();
            isRunning = true;
            gameLoop = setInterval(() => {
                if (!isPaused) {
                    update();
                    draw();
                }
            }, 100);
            
            startBtn.textContent = '暂停';
        }
        
        function pauseGame() {
            isPaused = !isPaused;
            startBtn.textContent = isPaused ? '继续' : '暂停';
        }
        
        function resetGame() {
            isRunning = false;
            isPaused = false;
            clearInterval(gameLoop);
            initGame();
            draw();
            startBtn.textContent = '开始游戏';
            overlayEl.style.display = 'none';
            gameOverEl.style.display = 'none';
        }
        
        // Event listeners
        document.addEventListener('keydown', (e) => {
            if (!isRunning && ['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.key)) {
                startGame();
            }
            
            switch (e.key) {
                case 'ArrowUp':
                    if (direction.y !== 1) nextDirection = { x: 0, y: -1 };
                    e.preventDefault();
                    break;
                case 'ArrowDown':
                    if (direction.y !== -1) nextDirection = { x: 0, y: 1 };
                    e.preventDefault();
                    break;
                case 'ArrowLeft':
                    if (direction.x !== 1) nextDirection = { x: -1, y: 0 };
                    e.preventDefault();
                    break;
                case 'ArrowRight':
                    if (direction.x !== -1) nextDirection = { x: 1, y: 0 };
                    e.preventDefault();
                    break;
                case ' ':
                    if (isRunning) {
                        pauseGame();
                    } else {
                        startGame();
                    }
                    e.preventDefault();
                    break;
            }
        });
        
        startBtn.addEventListener('click', () => {
            if (isRunning) {
                pauseGame();
            } else {
                startGame();
            }
        });
        
        resetBtn.addEventListener('click', resetGame);
        restartBtn.addEventListener('click', () => {
            overlayEl.style.display = 'none';
            gameOverEl.style.display = 'none';
            startGame();
        });
        
        // Initialize
        initGame();
        draw();
    </script>
</body>
</html>
